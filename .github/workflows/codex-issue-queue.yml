name: Codex Issue Queue

on:
  issues:
    types: [opened, labeled, unlabeled, closed, reopened]

permissions:
  contents: read
  issues: write

concurrency:
  group: codex-issue-queue
  cancel-in-progress: false

jobs:
  orchestrate:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Maintain single active queue issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const QUEUED = 'codex-queued';
            const ACTIVE = 'codex-in-progress';
            const MARKER = '<!-- codex-queue-orchestrator -->';

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const issuesOnly = openIssues.filter((i) => !i.pull_request);
            const activeIssues = issuesOnly.filter((i) => i.labels.some((l) => l.name === ACTIVE));
            const queuedIssues = issuesOnly
              .filter((i) => i.labels.some((l) => l.name === QUEUED) && !i.labels.some((l) => l.name === ACTIVE))
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            // Ensure at most one active issue label remains.
            const [keeper, ...extras] = activeIssues.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            for (const issue of extras) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: ACTIVE }).catch(() => {});
            }

            let promoted = null;
            if (!keeper && queuedIssues.length > 0) {
              promoted = queuedIssues[0];
              await github.rest.issues.addLabels({ owner, repo, issue_number: promoted.number, labels: [ACTIVE] });
            }

            const active = keeper || promoted;

            if (promoted) {
              const body = `${MARKER}
Queue update: this issue is now **active** for Codex work.

> Manual step required: GitHub Actions cannot auto-start a Codex coding session. A human must launch Codex manually against this issue.

When implementation PR is opened, keep this issue as the only \\`${ACTIVE}\\` issue until that PR is merged or closed.`;

              await github.rest.issues.createComment({ owner, repo, issue_number: promoted.number, body });
            }

            core.info(active
              ? `Active queue issue: #${active.number}`
              : 'No active queue issue.');
